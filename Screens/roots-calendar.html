<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celtic Tree Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #070e06;
  --surface: #0f1a0e;
  --surface2: #172615;
  --gold: #c9a84c;
  --gold2: #e8cc88;
  --cream: #eee0bc;
  --muted: #527048;
  --text: #c0d8b8;
  --dim: #3a5030;
  --border: #1e3019;
  --today-bg: #2a1508;
  --yearday-bg: #100820;
  --strip-h: 54px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IM Fell English', Georgia, serif;
}

#app {
  max-width: 660px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* ─── Title ─── */
.app-title {
  text-align: center;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.app-title h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.app-title p {
  font-size: 0.72rem;
  color: var(--dim);
  margin-top: 0.2rem;
  font-style: italic;
}

/* ─── Year navigation ─── */
.year-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--gold);
  cursor: pointer;
  padding: 0.2rem 0.65rem;
  font-size: 0.9rem;
  border-radius: 3px;
  transition: all 0.15s;
  line-height: 1.6;
}
.nav-btn:hover { background: var(--surface2); border-color: var(--gold); }
.year-label {
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.12em;
}

/* ─── Month header card ─── */
.month-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface2) 100%);
  padding: 1.5rem 1rem 1.25rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.month-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% -20%, rgba(201,168,76,0.1) 0%, transparent 65%);
  pointer-events: none;
}
.m-ogham { font-size: 2.4rem; color: var(--gold); opacity: 0.5; line-height: 1; margin-bottom: 0.4rem; letter-spacing: 0.3em; }
.m-name  { font-family: 'Cinzel Decorative', serif; font-size: 1.9rem; color: var(--gold2); line-height: 1.1; margin-bottom: 0.2rem; text-shadow: 0 0 40px rgba(201,168,76,0.25); }
.m-tree  { font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.4rem; }
.m-keyword { font-style: italic; color: var(--cream); font-size: 0.9rem; opacity: 0.75; margin-bottom: 0.65rem; }
.m-dates { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--dim); letter-spacing: 0.05em; }

/* ─── Month navigation ─── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.mnav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  padding: 0.35rem 0.75rem;
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  border-radius: 4px;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  white-space: nowrap;
}
.mnav-btn:hover { border-color: var(--gold); color: var(--gold); }
.mnav-center { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
.month-pos { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--dim); letter-spacing: 0.05em; }
.today-btn {
  background: none;
  border: 1px solid var(--dim);
  color: var(--dim);
  cursor: pointer;
  padding: 0.2rem 0.6rem;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  border-radius: 3px;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.today-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ─── Calendar grid ─── */
.cal-grid {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
}
.wd-headers {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.wd-header {
  text-align: center;
  padding: 0.45rem 0;
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
}
.days-wrap {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.day-cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.5rem 0.3rem;
  min-height: 62px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.day-cell:nth-child(7n) { border-right: none; }
.day-cell:nth-last-child(-n+7) { border-bottom: none; }
.day-cell:hover { background: var(--surface2); }
.day-cell.is-today { background: var(--today-bg); }
.day-cell.is-today::after {
  content: '';
  position: absolute;
  inset: 1px;
  border: 1px solid var(--gold);
  border-radius: 2px;
  pointer-events: none;
}
.dn { font-family: 'Cinzel', serif; font-size: 1.05rem; color: var(--cream); line-height: 1; margin-bottom: 0.25rem; }
.day-cell.is-today .dn { color: var(--gold2); }
.gd { font-size: 0.6rem; color: var(--dim); font-family: 'Cinzel', serif; letter-spacing: 0.02em; }
.day-cell.is-today .gd { color: var(--muted); }

/* ─── Year Day ─── */
.yearday-wrap { padding: 1rem; }
.yearday-cell {
  border: 1px solid #2a1050;
  border-radius: 8px;
  padding: 1.25rem 1rem;
  text-align: center;
  background: var(--yearday-bg);
  cursor: default;
}
.yearday-cell.is-today { border-color: var(--gold); }
.yd-title { font-family: 'Cinzel', serif; color: #c0a0f0; font-size: 0.95rem; letter-spacing: 0.12em; margin-bottom: 0.3rem; }
.yd-greg  { font-size: 0.72rem; color: #705090; margin-bottom: 0.75rem; }
.yd-desc  { font-size: 0.8rem; color: #8060b0; font-style: italic; line-height: 1.5; }

/* ─── Month strip ─── */
.month-strip {
  display: flex;
  gap: 0.2rem;
  overflow-x: auto;
  padding-bottom: 0.25rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sm {
  flex: 0 0 auto;
  min-width: 42px;
  padding: 0.3rem 0.35rem;
  border: 1px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  text-align: center;
  background: var(--surface);
  transition: all 0.12s;
}
.sm:hover { border-color: var(--muted); background: var(--surface2); }
.sm.active { border-color: var(--gold); background: var(--surface2); }
.sm.has-today { border-color: var(--muted); }
.sm-n { font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--dim); display: block; margin-bottom: 0.1rem; }
.sm-name { font-family: 'Cinzel', serif; font-size: 0.68rem; color: var(--text); display: block; }
.sm.active .sm-name { color: var(--gold); }
</style>
</head>
<body>
<div id="app">

  <div class="app-title">
    <h1>Celtic Tree Calendar</h1>
    <p>Beth-Luis-Nion · 13 months of 28 days</p>
  </div>

  <div class="year-nav">
    <button class="nav-btn" id="prevYear">◄</button>
    <span class="year-label" id="yearLabel"></span>
    <button class="nav-btn" id="nextYear">►</button>
  </div>

  <div class="month-card" id="monthCard"></div>

  <div class="month-nav">
    <button class="mnav-btn" id="prevMonth">◄ <span id="prevName"></span></button>
    <div class="mnav-center">
      <span class="month-pos" id="monthPos"></span>
      <button class="today-btn" id="todayBtn">☽ Today</button>
    </div>
    <button class="mnav-btn" id="nextMonth"><span id="nextName"></span> ►</button>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="month-strip" id="strip"></div>

</div>

<script>
const M = [
  { n:1,  name:'Beth',   tree:'Birch',    og:'ᚁ', kw:'New Beginnings' },
  { n:2,  name:'Luis',   tree:'Rowan',    og:'ᚂ', kw:'Protection'     },
  { n:3,  name:'Nion',   tree:'Ash',      og:'ᚅ', kw:'Connection'     },
  { n:4,  name:'Fearn',  tree:'Alder',    og:'ᚃ', kw:'Guidance'       },
  { n:5,  name:'Saille', tree:'Willow',   og:'ᚄ', kw:'Intuition'      },
  { n:6,  name:'Huath',  tree:'Hawthorn', og:'ᚆ', kw:'Cleansing'      },
  { n:7,  name:'Duir',   tree:'Oak',      og:'ᚇ', kw:'Strength'       },
  { n:8,  name:'Tinne',  tree:'Holly',    og:'ᚈ', kw:'Balance'        },
  { n:9,  name:'Coll',   tree:'Hazel',    og:'ᚉ', kw:'Wisdom'         },
  { n:10, name:'Muin',   tree:'Vine',     og:'ᚋ', kw:'Harvest'        },
  { n:11, name:'Gort',   tree:'Ivy',      og:'ᚌ', kw:'Perseverance'   },
  { n:12, name:'Ngetal', tree:'Reed',     og:'ᚍ', kw:'Healing'        },
  { n:13, name:'Ruis',   tree:'Elder',    og:'ᚏ', kw:'Transition'     },
];

const WD  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const GM  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const today = new Date(); today.setHours(0,0,0,0);

function yearStart(y) { return new Date(y, 11, 24); } // Dec 24

function celticYearOf(d) {
  return (d.getMonth() === 11 && d.getDate() >= 24) ? d.getFullYear() : d.getFullYear() - 1;
}

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function sameDay(a, b) { return a.toDateString() === b.toDateString(); }
function fmtG(d) { return d.getDate() + ' ' + GM[d.getMonth()]; }

function todayInfo() {
  const ys  = yearStart(celticYearOf(today));
  const off = Math.round((today - ys) / 86400000);
  if (off === 364) return { yd: true };
  return { month: Math.floor(off / 28) + 1, day: (off % 28) + 1, yd: false };
}

// State
let curYear  = celticYearOf(today);
let curMonth = todayInfo().yd ? 'yd' : todayInfo().month;

function render() {
  const ys = yearStart(curYear);

  // Year label
  document.getElementById('yearLabel').textContent =
    `Celtic Year ${curYear} – ${curYear + 1}`;

  if (curMonth === 'yd') { renderYD(ys); renderStrip(ys); return; }

  const mo   = M[curMonth - 1];
  const ms   = addDays(ys, (curMonth - 1) * 28);
  const me   = addDays(ms, 27);

  // Month card
  document.getElementById('monthCard').innerHTML =
    `<div class="m-ogham">${mo.og}</div>
     <div class="m-name">${mo.name}</div>
     <div class="m-tree">The ${mo.tree}</div>
     <div class="m-keyword"><em>${mo.kw}</em></div>
     <div class="m-dates">${fmtG(ms)} – ${fmtG(me)}</div>`;

  // Nav labels
  document.getElementById('prevName').textContent = curMonth > 1 ? M[curMonth-2].name : '';
  document.getElementById('nextName').textContent = curMonth < 13 ? M[curMonth].name : 'Year Day';
  document.getElementById('monthPos').textContent  = `Month ${curMonth} of 13`;

  // Week headers — all months in a year start on same weekday
  const startDow = ys.getDay(); // weekday of Dec 24
  const hdrs = Array.from({length:7}, (_,i) => WD[(startDow+i)%7]);

  // Days
  const days = Array.from({length:28}, (_,i) => {
    const d = addDays(ms, i);
    return `<div class="day-cell${sameDay(d,today)?' is-today':''}">
      <span class="dn">${i+1}</span>
      <span class="gd">${fmtG(d)}</span>
    </div>`;
  }).join('');

  document.getElementById('calGrid').innerHTML =
    `<div class="wd-headers">${hdrs.map(h=>`<div class="wd-header">${h}</div>`).join('')}</div>
     <div class="days-wrap">${days}</div>`;

  renderStrip(ys);
}

function renderYD(ys) {
  const yd = addDays(ys, 364);
  const it = sameDay(yd, today);

  const mo = M[12]; // Ruis for nav
  document.getElementById('monthCard').innerHTML =
    `<div class="m-ogham">☽</div>
     <div class="m-name">Year Day</div>
     <div class="m-tree">The Nameless Day</div>
     <div class="m-keyword"><em>Between the worlds</em></div>
     <div class="m-dates">${fmtG(yd)}</div>`;

  document.getElementById('prevName').textContent = 'Ruis';
  document.getElementById('nextName').textContent = 'Beth';
  document.getElementById('monthPos').textContent  = 'Day out of time';

  document.getElementById('calGrid').innerHTML =
    `<div class="yearday-wrap">
       <div class="yearday-cell${it?' is-today':''}">
         <div class="yd-title">☽ &nbsp; YEAR AND A DAY &nbsp; ☾</div>
         <div class="yd-greg">${fmtG(yd)}</div>
         <div class="yd-desc">This day stands outside the calendar —<br>
           a threshold between years, belonging to no month.<br>
           A time for rest, reflection, and passage.</div>
       </div>
     </div>`;
}

function renderStrip(ys) {
  const ti = todayInfo();
  const ty = celticYearOf(today);

  const items = M.map(mo => {
    const isActive   = curMonth === mo.n;
    const hasToday   = ty === curYear && !ti.yd && ti.month === mo.n;
    return `<div class="sm${isActive?' active':''}${hasToday?' has-today':''}"
                 onclick="go(${mo.n})">
      <span class="sm-n">${mo.n}</span>
      <span class="sm-name">${mo.name}</span>
    </div>`;
  });

  const ydActive   = curMonth === 'yd';
  const ydHasToday = ty === curYear && ti.yd;
  items.push(`<div class="sm${ydActive?' active':''}${ydHasToday?' has-today':''}"
                   onclick="go('yd')">
    <span class="sm-n">☽</span>
    <span class="sm-name">YrDay</span>
  </div>`);

  const strip = document.getElementById('strip');
  strip.innerHTML = items.join('');
  const el = strip.querySelector('.active');
  if (el) el.scrollIntoView({ inline:'center', block:'nearest' });
}

function go(m) { curMonth = m; render(); }

document.getElementById('prevMonth').onclick = () => {
  if (curMonth === 'yd')      curMonth = 13;
  else if (curMonth > 1)      curMonth--;
  else { curYear--; curMonth = 13; }
  render();
};
document.getElementById('nextMonth').onclick = () => {
  if (curMonth === 13)        curMonth = 'yd';
  else if (curMonth === 'yd') { curYear++; curMonth = 1; }
  else                        curMonth++;
  render();
};
document.getElementById('prevYear').onclick = () => { curYear--; render(); };
document.getElementById('nextYear').onclick = () => { curYear++; render(); };
document.getElementById('todayBtn').onclick  = () => {
  curYear  = celticYearOf(today);
  const ti = todayInfo();
  curMonth = ti.yd ? 'yd' : ti.month;
  render();
};

render();
</script>
</body>
</html>
