<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roots Calendar — Celtic Card Options</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #070e06;
    --surface:   #0f1a0e;
    --surface2:  #172615;
    --gold:      #c9a84c;
    --gold2:     #e8cc88;
    --cream:     #eee0bc;
    --muted:     #527048;
    --text:      #c0d8b8;
    --dim:       #3a5030;
    --border:    #1e3019;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f09;
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 32px 16px 48px;
    font-family: 'Cinzel', serif;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 360px;
  }

  .label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  /* ── CURRENT (pill) ─────────────────────────────────────── */
  .celtic-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .ogham-sm {
    font-size: 22px;
    color: var(--gold);
    line-height: 1;
  }

  .pill-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .pill-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.08em;
  }

  .pill-keyword {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .pill-range {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── OPTION 1 (full card) ───────────────────────────────── */
  .celtic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    display: flex;
    gap: 18px;
    align-items: stretch;
    position: relative;
    overflow: hidden;
  }

  .celtic-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .ogham-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 54px;
    padding-right: 18px;
    border-right: 1px solid var(--border);
  }

  .ogham-lg {
    font-size: 48px;
    color: var(--gold);
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.3));
  }

  .ogham-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .card-body {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .card-month-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.1em;
  }

  .card-tree {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .card-keyword {
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }

  .card-range {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── OPTION 1b (full card, centered) ───────────────────── */
  .celtic-card-center {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    gap: 8px;
  }

  .celtic-card-center::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .ogham-center {
    font-size: 56px;
    color: var(--gold);
    line-height: 1;
    filter: drop-shadow(0 0 10px rgba(201,168,76,0.3));
    margin-bottom: 4px;
  }

  .center-month-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.12em;
  }

  .center-tree {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .center-keyword {
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }

  .center-range {
    margin-top: 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── OPTION 1c (banner with accent stripe) ──────────────── */
  .celtic-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .banner-accent {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .banner-body {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .banner-ogham {
    font-size: 44px;
    color: var(--gold);
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.25));
  }

  .banner-divider {
    width: 1px;
    align-self: stretch;
    background: var(--border);
  }

  .banner-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .banner-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.1em;
  }

  .banner-tree {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .banner-keyword {
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  .banner-range {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .page-title {
    width: 100%;
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding-bottom: 8px;
  }
</style>
</head>
<body>

<div class="page-title" style="flex-basis:100%">Celtic Month Card — Layout Options</div>

<!-- ── Column 1: Current + Option 1a ── -->
<div class="column">

  <div class="label">Current (pill)</div>
  <div class="celtic-pill">
    <span class="ogham-sm">ᚇ</span>
    <div class="pill-info">
      <span class="pill-name">Duir · Oak</span>
      <span class="pill-keyword">Strength</span>
    </div>
    <span class="pill-range">Jun 10 – Jul 7</span>
  </div>

  <div style="height: 24px;"></div>

  <div class="label">Option 1a — Left anchor</div>
  <div class="celtic-card">
    <div class="ogham-col">
      <span class="ogham-lg">ᚇ</span>
      <span class="ogham-label">Ogham</span>
    </div>
    <div class="card-body">
      <div class="card-month-name">Duir</div>
      <div class="card-tree">Oak</div>
      <div class="card-keyword">Strength</div>
      <div class="card-range">Jun 10 – Jul 7</div>
    </div>
  </div>

</div>

<!-- ── Column 2: Option 1b + 1c ── -->
<div class="column">

  <div class="label">Option 1b — Centred</div>
  <div class="celtic-card-center">
    <span class="ogham-center">ᚇ</span>
    <div class="center-month-name">Duir</div>
    <div class="center-tree">Oak</div>
    <div class="center-keyword">Strength</div>
    <div class="center-range">Jun 10 – Jul 7</div>
  </div>

  <div style="height: 8px;"></div>

  <div class="label">Option 1c — Banner with accent stripe</div>
  <div class="celtic-banner">
    <div class="banner-accent"></div>
    <div class="banner-body">
      <span class="banner-ogham">ᚇ</span>
      <div class="banner-divider"></div>
      <div class="banner-info">
        <div class="banner-name">Duir</div>
        <div class="banner-tree">Oak</div>
        <div class="banner-keyword">Strength</div>
        <div class="banner-range">Jun 10 – Jul 7</div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
