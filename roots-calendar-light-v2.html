<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roots Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:    #f7f3ec;
  --surf:  #ffffff;
  --bdr:   #b8ae9e;
  --ink:   #111108;
  --ink2:  #3a3226;
  --sub:   #5a5040;
  --green: #1a4018;
  --gold:  #b07800;
  --today: #1a4018;
  --focus: #0055cc;
  --slot:  56px;
}
html,body { height:100%; background:var(--bg); color:var(--ink); font-family:'Lora',Georgia,serif; overflow:hidden; }
#shell { display:flex; flex-direction:column; height:100%; max-width:430px; margin:0 auto; }

/* ── Top bar ── */
#topbar {
  display:grid; grid-template-columns:44px 1fr auto;
  align-items:center; gap:.25rem;
  padding:0 .5rem 0 .25rem; height:52px;
  background:var(--surf); border-bottom:1.5px solid var(--bdr); flex-shrink:0;
}
#menuBtn {
  width:44px; height:44px; border:none; background:none; color:var(--ink);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px; border-radius:6px;
}
#menuBtn:hover { background:#eee8dc; }
#menuBtn:focus-visible { outline:2px solid var(--focus); outline-offset:2px; }
#menuBtn span { display:block; width:20px; height:2px; background:var(--ink); border-radius:2px; }
#periodLabel { min-width:0; overflow:hidden; }
#pl-name { font-family:'Cinzel',serif; font-size:.95rem; font-weight:700; color:var(--ink); letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#pl-kw   { font-size:.65rem; color:var(--gold); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:.05rem; }
#navgroup { display:flex; align-items:center; gap:0; flex-shrink:0; }
.arr { width:36px; height:44px; border:none; background:none; color:var(--ink2); font-size:1rem; cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.arr:hover { background:#eee8dc; }
.arr:focus-visible { outline:2px solid var(--focus); outline-offset:2px; }
#todayBtn { height:32px; padding:0 .6rem; border:1.5px solid var(--bdr); border-radius:6px; background:none; color:var(--green); font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.05em; cursor:pointer; white-space:nowrap; }
#todayBtn:hover { border-color:var(--green); }
#todayBtn:focus-visible { outline:2px solid var(--focus); outline-offset:2px; }

/* ── Weekday header row ── */
#weekdays { display:none; grid-template-columns:repeat(7,1fr); background:var(--surf); border-bottom:1.5px solid var(--bdr); flex-shrink:0; }
#weekdays.show { display:grid; }
.wd { text-align:center; padding:.3rem 0; font-family:'Cinzel',serif; font-size:.62rem; color:var(--sub); font-weight:600; letter-spacing:.06em; text-transform:uppercase; }

/* ── Cal area ── */
#cal { flex:1; overflow-y:auto; overflow-x:hidden; }

/* ════ MONTH ════ */
.month-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.dc { position:relative; min-height:64px; border-right:1px solid var(--bdr); border-bottom:1px solid var(--bdr); display:flex; flex-direction:column; align-items:center; padding-top:.4rem; cursor:pointer; }
.dc:nth-child(7n) { border-right:none; }
.dc.last-row      { border-bottom:none; }
.dc:hover         { background:#eee8dc; }
.dc button        { position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;background:none;cursor:pointer; }
.dc button:focus-visible { opacity:1;outline:2px solid var(--focus);outline-offset:-2px;border-radius:4px; }
.dc-inner         { pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:4px; }
.dc-n             { font-family:'Cinzel',serif; font-size:1rem; color:var(--ink); line-height:1; }
.dc.today         { background:#e4ede2; }
.dc.today .dc-n   { width:30px;height:30px;border-radius:50%;background:var(--today);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem; }
.dots             { display:flex; gap:3px; }
.dot              { width:6px;height:6px;border-radius:50%; }

/* ════ UPCOMING (month) ════ */
.upcoming { border-top:1.5px solid var(--bdr); background:var(--surf); }
.up-hdr   { padding:.5rem .875rem; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--sub); font-weight:600; border-bottom:1px solid var(--bdr); background:#f0ece4; }
.up-item  { display:flex; align-items:center; gap:.65rem; padding:.6rem .875rem; border-bottom:1px solid var(--bdr); cursor:pointer; transition:background .1s; }
.up-item:last-child { border-bottom:none; }
.up-item:hover { background:#f0ece4; }
.up-item:focus-visible { outline:2px solid var(--focus); outline-offset:-2px; }
.up-badge { flex-shrink:0; width:32px; text-align:center; }
.up-dn    { font-family:'Cinzel',serif; font-size:.95rem; font-weight:700; color:var(--green); line-height:1; }
.up-dg    { font-size:.58rem; color:var(--sub); }
.up-bar   { width:3px; align-self:stretch; border-radius:2px; flex-shrink:0; }
.up-info  { flex:1; min-width:0; }
.up-title { font-size:.85rem; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.up-time  { font-size:.68rem; color:var(--sub); margin-top:.1rem; }
.up-empty { padding:.875rem; font-size:.82rem; color:var(--sub); font-style:italic; }

/* ════ TIME GRID (shared: week / 3-day / day) ════ */
.tg-wrap    { }
.tg-head    { display:grid; background:var(--surf); border-bottom:1.5px solid var(--bdr); }
.tg-gutter  { border-right:1px solid var(--bdr); }
.tg-dcol    { padding:.3rem .1rem; text-align:center; border-right:1px solid var(--bdr); cursor:pointer; }
.tg-dcol:last-child { border-right:none; }
.tg-dcol:hover { background:#e4ede2; }
.tg-dcol.today { background:#e4ede2; }
.tg-dcol:focus-visible { outline:2px solid var(--focus); }
.tg-dname   { font-family:'Cinzel',serif; font-size:.55rem; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; }
.tg-dnum    { font-family:'Cinzel',serif; font-size:.95rem; color:var(--ink); line-height:1.2; }
.tg-dcol.today .tg-dnum { width:26px;height:26px;border-radius:50%;background:var(--today);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem; }
.tg-body    { display:grid; position:relative; }
.tl         { height:var(--slot);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 5px 0;font-family:'Cinzel',serif;font-size:.55rem;color:var(--sub);border-right:1px solid var(--bdr);background:#f0ece4; }
.wc         { position:relative; border-right:1px solid var(--bdr); }
.wc:last-child { border-right:none; }
.ws         { height:var(--slot); border-bottom:1px solid #e0d8cc; }
.ws:last-child { border-bottom:none; }

/* event blocks */
.eb { position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;border-left:3px solid;cursor:pointer;overflow:hidden;z-index:2; }
.eb:hover { filter:brightness(.93); }
.eb:focus-visible { outline:2px solid var(--focus); }
.eb-t { font-family:'Cinzel',serif;font-size:.6rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3; }
.eb-h { font-size:.56rem;opacity:.85; }
.gold { background:#fef6dc;border-color:#b07800;color:#5a3800; }
.grn  { background:#e8f5e4;border-color:#2d6b28;color:#12400e; }
.rose { background:#fde8ee;border-color:#8b2040;color:#5a0820; }
.blue { background:#e4eeff;border-color:#1a4080;color:#0a2060; }
.nl { position:absolute;left:0;right:0;height:2px;background:#cc2020;z-index:3;pointer-events:none; }
.nl::before { content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#cc2020; }

/* ════ DAY VIEW extra header ════ */
.day-head-row { display:grid;grid-template-columns:40px 1fr;border-bottom:1.5px solid var(--bdr);background:var(--surf); }
.day-h-g    { border-right:1px solid var(--bdr); }
.day-h-info { padding:.5rem .75rem; }
.day-h-date { font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:var(--ink); }
.day-h-kw   { font-size:.7rem;color:var(--sub);margin-top:.15rem; }
.allday-row { display:grid;grid-template-columns:40px 1fr;border-bottom:1px solid var(--bdr);background:#f0ece4;min-height:34px; }
.allday-lbl { border-right:1px solid var(--bdr);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-family:'Cinzel',serif;font-size:.5rem;color:var(--sub);letter-spacing:.04em; }
.allday-pills { display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;padding:.3rem .5rem; }
.ad-pill { border-radius:4px;padding:.15rem .55rem;font-size:.68rem;font-family:'Cinzel',serif;cursor:pointer; }

/* ════ SCHEDULE VIEW ════ */
.sched-day   { border-bottom:1.5px solid var(--bdr); }
.sched-d-hdr {
  display:flex; align-items:center; gap:.75rem;
  padding:.5rem .875rem; background:#f0ece4;
  border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:1;
}
.sched-d-hdr.today-hdr { background:#e4ede2; }
.sched-badge { flex-shrink:0; text-align:center; width:36px; }
.sched-dn    { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700; color:var(--green); line-height:1; }
.sched-dn.today-n { width:30px;height:30px;border-radius:50%;background:var(--today);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem; }
.sched-dg    { font-size:.6rem; color:var(--sub); }
.sched-mo    { font-family:'Cinzel',serif; font-size:.72rem; color:var(--sub); font-style:italic; }
.sched-ev    { display:flex; align-items:center; gap:.65rem; padding:.6rem .875rem; border-bottom:1px solid var(--bdr); cursor:pointer; }
.sched-ev:last-child { border-bottom:none; }
.sched-ev:hover { background:#f5f0e8; }
.sched-ev:focus-visible { outline:2px solid var(--focus); outline-offset:-2px; }
.sched-bar   { width:3px; align-self:stretch; border-radius:2px; flex-shrink:0; }
.sched-info  { flex:1; min-width:0; }
.sched-et    { font-size:.88rem; color:var(--ink); }
.sched-eh    { font-size:.68rem; color:var(--sub); margin-top:.1rem; }
.sched-empty { padding:2rem 1rem; text-align:center; font-size:.85rem; color:var(--sub); font-style:italic; }
.sched-mo-hdr {
  padding:.4rem .875rem; background:var(--bg);
  font-family:'Cinzel',serif; font-size:.65rem; color:var(--sub);
  letter-spacing:.1em; text-transform:uppercase; border-bottom:1px solid var(--bdr);
  position:sticky; top:0; z-index:2;
}

/* year day */
.yd-cell { padding:2rem 1.25rem;text-align:center; }
.yd-t { font-family:'Cinzel',serif;color:#4a3080;font-size:1rem;margin-bottom:.5rem; }
.yd-g { font-size:.75rem;color:#6a50a0;margin-bottom:.5rem; }
.yd-d { font-size:.85rem;color:#5a4090;font-style:italic;line-height:1.7; }

/* ════ DRAWER ════ */
#overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s; }
#overlay.open { opacity:1;pointer-events:all; }
#drawer { position:fixed;top:0;left:0;bottom:0;width:270px;background:var(--surf);z-index:51;transform:translateX(-100%);transition:transform .22s ease;display:flex;flex-direction:column;border-right:1.5px solid var(--bdr);overflow-y:auto; }
#drawer.open { transform:translateX(0); }
.drawer-head { padding:1.1rem 1rem .7rem;border-bottom:1px solid var(--bdr); }
.drawer-title { font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:var(--green);letter-spacing:.12em;text-transform:uppercase; }
.drawer-sub   { font-size:.68rem;color:var(--sub);margin-top:.15rem;font-style:italic; }
.drawer-sect  { padding:.55rem 1rem .2rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);border-top:1px solid var(--bdr);margin-top:.3rem; }
.drawer-sect:first-of-type { border-top:none; margin-top:0; }
.dview-btn { display:flex;align-items:center;gap:.65rem;width:100%;padding:.6rem 1rem;border:none;background:none;color:var(--ink2);font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.04em;cursor:pointer;text-align:left; }
.dview-btn:hover { background:#eee8dc; }
.dview-btn.active { background:#e4ede2;color:var(--green);font-weight:700; }
.dview-btn:focus-visible { outline:2px solid var(--focus);outline-offset:-2px; }
.dview-icon { width:20px;text-align:center;font-size:.85rem; }

/* Month strip */
.dstrip { padding:.3rem .5rem;display:flex;flex-direction:column;gap:.05rem; }
.dsm { display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;border-radius:6px;cursor:pointer;border:none;background:none;width:100%;text-align:left; }
.dsm:hover { background:#eee8dc; }
.dsm.active { background:#e4ede2; }
.dsm:focus-visible { outline:2px solid var(--focus);outline-offset:2px; }
.dsm-n  { font-family:'Cinzel',serif;font-size:.65rem;color:var(--sub);width:16px;text-align:right;flex-shrink:0; }
.dsm-nm { font-family:'Cinzel',serif;font-size:.78rem;color:var(--ink2);flex-shrink:0;min-width:55px; }
.dsm-kw { font-size:.65rem;color:var(--sub);font-style:italic; }
.dsm.active .dsm-nm { color:var(--green);font-weight:700; }
.dsm-dot { width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0; }

/* ════ SETTINGS ════ */
.settings-body { padding:.5rem 1rem 1rem; display:flex; flex-direction:column; gap:.75rem; }
.sett-row { display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
.sett-label { font-size:.78rem; color:var(--ink2); }
.sett-sub   { font-size:.65rem; color:var(--sub); margin-top:.1rem; }
.sett-select {
  border:1.5px solid var(--bdr); border-radius:6px; background:var(--surf);
  color:var(--ink); font-family:'Lora',serif; font-size:.75rem;
  padding:.3rem .5rem; cursor:pointer;
}
.sett-select:focus-visible { outline:2px solid var(--focus); outline-offset:2px; }

/* Toggle switch */
.toggle { position:relative; width:42px; height:24px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.toggle-track {
  position:absolute; inset:0; border-radius:12px;
  background:var(--bdr); cursor:pointer; transition:background .2s;
}
.toggle input:checked + .toggle-track { background:var(--green); }
.toggle-thumb {
  position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%;
  background:#fff; transition:transform .2s; pointer-events:none;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle input:checked ~ .toggle-thumb { transform:translateX(18px); }
.toggle input:focus-visible + .toggle-track { outline:2px solid var(--focus); outline-offset:2px; }
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <button id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="drawer">
      <span></span><span></span><span></span>
    </button>
    <div id="periodLabel">
      <div id="pl-name" aria-live="polite"></div>
      <div id="pl-kw"></div>
    </div>
    <div id="navgroup">
      <button class="arr" id="prev" aria-label="Previous">&#9664;</button>
      <button id="todayBtn" aria-label="Go to today">Today</button>
      <button class="arr" id="next" aria-label="Next">&#9654;</button>
    </div>
  </div>

  <div id="weekdays" aria-hidden="true"></div>
  <div id="cal" role="main" aria-label="Calendar"></div>
</div>

<div id="overlay" aria-hidden="true" onclick="closeDrawer()"></div>
<nav id="drawer" aria-label="Calendar menu" aria-hidden="true">
  <div class="drawer-head">
    <div class="drawer-title">Roots Calendar</div>
    <div class="drawer-sub">Celtic Tree Calendar · 13 months</div>
  </div>

  <div class="drawer-sect">View</div>
  <button class="dview-btn active" id="dvMonth"    onclick="setView('month');closeDrawer()"    aria-pressed="true"><span class="dview-icon">&#9790;</span> Month</button>
  <button class="dview-btn"        id="dvThreeday" onclick="setView('threeday');closeDrawer()" aria-pressed="false"><span class="dview-icon">&#9783;</span> 3 Days</button>
  <button class="dview-btn"        id="dvWeek"     onclick="setView('week');closeDrawer()"     aria-pressed="false"><span class="dview-icon">&#9635;</span> Week</button>
  <button class="dview-btn"        id="dvDay"      onclick="setView('day');closeDrawer()"      aria-pressed="false"><span class="dview-icon">&#9670;</span> Day</button>
  <button class="dview-btn"        id="dvSchedule" onclick="setView('schedule');closeDrawer()" aria-pressed="false"><span class="dview-icon">&#9776;</span> Schedule</button>

  <div class="drawer-sect">Months</div>
  <div class="dstrip" id="dstrip"></div>

  <div class="drawer-sect">Settings</div>
  <div class="settings-body">

    <div class="sett-row">
      <div>
        <div class="sett-label">Start of day</div>
        <div class="sett-sub">First hour shown in time views</div>
      </div>
      <select class="sett-select" id="sett-h0" onchange="saveSett()">
        <option value="6">06:00</option>
        <option value="7" selected>07:00</option>
        <option value="8">08:00</option>
      </select>
    </div>

    <div class="sett-row">
      <div>
        <div class="sett-label">Show Gregorian date</div>
        <div class="sett-sub">Show day + month under cell number</div>
      </div>
      <label class="toggle" aria-label="Show Gregorian date">
        <input type="checkbox" id="sett-greg" onchange="saveSett()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="sett-row">
      <div>
        <div class="sett-label">Show Celtic tree</div>
        <div class="sett-sub">Show tree name in day headers</div>
      </div>
      <label class="toggle" aria-label="Show Celtic tree name">
        <input type="checkbox" id="sett-tree" checked onchange="saveSett()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <button onclick="closeDrawer()" aria-label="Open full settings screen"
        style="width:100%;margin-top:.25rem;padding:.65rem 1rem;border:1.5px solid var(--bdr);border-radius:8px;background:none;color:var(--ink2);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
      <span>More settings</span>
      <span style="font-size:.85rem;color:var(--sub)">&#9654;</span>
    </button>

  </div>
</nav>

<script>
const MO = [
  {n:1,  name:'Beth',   tree:'Birch',    og:'ᚁ', kw:'New Beginnings'},
  {n:2,  name:'Luis',   tree:'Rowan',    og:'ᚂ', kw:'Protection'},
  {n:3,  name:'Nion',   tree:'Ash',      og:'ᚅ', kw:'Connection'},
  {n:4,  name:'Fearn',  tree:'Alder',    og:'ᚃ', kw:'Guidance'},
  {n:5,  name:'Saille', tree:'Willow',   og:'ᚄ', kw:'Intuition'},
  {n:6,  name:'Huath',  tree:'Hawthorn', og:'ᚆ', kw:'Cleansing'},
  {n:7,  name:'Duir',   tree:'Oak',      og:'ᚇ', kw:'Strength'},
  {n:8,  name:'Tinne',  tree:'Holly',    og:'ᚈ', kw:'Balance'},
  {n:9,  name:'Coll',   tree:'Hazel',    og:'ᚉ', kw:'Wisdom'},
  {n:10, name:'Muin',   tree:'Vine',     og:'ᚋ', kw:'Harvest'},
  {n:11, name:'Gort',   tree:'Ivy',      og:'ᚌ', kw:'Perseverance'},
  {n:12, name:'Ngetal', tree:'Reed',     og:'ᚍ', kw:'Healing'},
  {n:13, name:'Ruis',   tree:'Elder',    og:'ᚏ', kw:'Transition'},
];
const GM  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const GML = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WD  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SLOT = 56;
const DOT  = {gold:'#b07800', grn:'#2d6b28', rose:'#8b2040', blue:'#1a4080'};

const EVS = [
  {cm:4,cd:7,  t:'Ecstatic Dance',     sh:19,  eh:22,   s:'gold', ad:false},
  {cm:4,cd:9,  t:'Call Frederique',    sh:10,  eh:11,   s:'grn',  ad:false},
  {cm:4,cd:12, t:'Cosmetics markt',    sh:9,   eh:17,   s:'rose', ad:false},
  {cm:4,cd:5,  t:'Client meeting',     sh:14,  eh:15.5, s:'blue', ad:false},
  {cm:4,cd:14, t:'Full moon ritual',   sh:null,eh:null, s:'gold', ad:true},
  {cm:4,cd:18, t:'n8n workshop',       sh:10,  eh:16,   s:'grn',  ad:false},
  {cm:5,cd:3,  t:'Market Oss',         sh:9,   eh:15,   s:'rose', ad:false},
  {cm:5,cd:11, t:'Anthroposophy talk', sh:19,  eh:21,   s:'blue', ad:false},
];

/* ── SETTINGS ── */
let sett = {h0:7, greg:false, tree:true};
function loadSett() {
  try { const s=JSON.parse(localStorage.getItem('rc-sett')); if(s) sett=s; } catch(e){}
  document.getElementById('sett-h0').value    = sett.h0;
  document.getElementById('sett-greg').checked = sett.greg;
  document.getElementById('sett-tree').checked = sett.tree;
}
function saveSett() {
  sett.h0    = +document.getElementById('sett-h0').value;
  sett.greg  = document.getElementById('sett-greg').checked;
  sett.tree  = document.getElementById('sett-tree').checked;
  try { localStorage.setItem('rc-sett', JSON.stringify(sett)); } catch(e){}
  render();
}

/* ── HELPERS ── */
const today = new Date(); today.setHours(0,0,0,0);
function ys(y)     { return new Date(y,11,24); }
function cyr(d)    { return (d.getMonth()===11&&d.getDate()>=24)?d.getFullYear():d.getFullYear()-1; }
function add(d,n)  { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function same(a,b) { return a.toDateString()===b.toDateString(); }
function fg(d)     { return d.getDate()+' '+GM[d.getMonth()]; }
function fgl(d)    { return GML[d.getMonth()]+' '+d.getDate(); }
function ft(h)     { const hh=Math.floor(h),mm=Math.round((h-hh)*60); return `${hh}:${mm.toString().padStart(2,'0')}`; }
function px(h)     { return (h-sett.h0)*SLOT; }
function pxh(d)    { return d*SLOT; }
function H1()      { return 22; }
function todayInfo() {
  const s=ys(cyr(today)), off=Math.round((today-s)/86400000);
  return off===364 ? {yd:true} : {month:Math.floor(off/28)+1, day:(off%28)+1, yd:false};
}
function celticOf(d) {
  const cy2=cyr(d), s=ys(cy2), off=Math.round((d-s)/86400000);
  return off===364 ? {yd:true,cy:cy2} : {month:Math.floor(off/28)+1,day:(off%28)+1,yd:false,cy:cy2};
}
function evsDay(m,d) { return EVS.filter(e=>e.cm===m&&e.cd===d); }

/* ── STATE ── */
let view='month', curY=cyr(today);
const _ti=todayInfo();
let curM=_ti.yd?'yd':_ti.month, curW=_ti.yd?0:Math.floor((_ti.day-1)/7), curD=_ti.yd?1:_ti.day;

/* ── DRAWER ── */
function openDrawer() {
  renderDStrip();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').setAttribute('aria-hidden','false');
  document.getElementById('menuBtn').setAttribute('aria-expanded','true');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').setAttribute('aria-hidden','true');
  document.getElementById('menuBtn').setAttribute('aria-expanded','false');
  document.getElementById('menuBtn').focus();
}
document.getElementById('menuBtn').onclick = openDrawer;
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

/* ── VIEW ── */
const VIEW_IDS = ['Month','Threeday','Week','Day','Schedule'];
function setView(v) {
  view=v;
  VIEW_IDS.forEach(x => {
    const b=document.getElementById('dv'+x);
    if(!b) return;
    b.classList.toggle('active', x.toLowerCase()===v);
    b.setAttribute('aria-pressed', x.toLowerCase()===v ? 'true' : 'false');
  });
  render();
}

/* ── RENDER ── */
function render() {
  const s=ys(curY);
  renderTopLabel(s);
  renderWDHeaders(s);
  const el=document.getElementById('cal');
  if(view==='month')       renderMonth(s,el);
  else if(view==='threeday') renderNDay(s,el,3);
  else if(view==='week')   renderNDay(s,el,7);
  else if(view==='day')    renderDay(s,el);
  else                     renderSchedule(s,el);
}

/* ── TOP LABEL ── */
function renderTopLabel(s) {
  const n=document.getElementById('pl-name'), kw=document.getElementById('pl-kw');
  if(curM==='yd') { n.textContent='Year Day'; kw.textContent='Between the worlds'; return; }
  const mo=MO[curM-1];
  if(view==='month') {
    n.textContent=`${mo.name} · ${curY}–${String(curY+1).slice(2)}`;
  } else if(view==='threeday') {
    n.textContent=`${mo.name} · Days ${curD}–${Math.min(curD+2,28)}`;
  } else if(view==='week') {
    const ws=curW*7+1, we=Math.min(ws+6,28);
    n.textContent=`${mo.name} · Wk ${curW+1}`;
  } else if(view==='day') {
    const dg=add(s,(curM-1)*28+curD-1);
    n.textContent=`${mo.name} · Day ${curD}`;
  } else {
    n.textContent=`Schedule · ${curY}–${String(curY+1).slice(2)}`;
  }
  kw.textContent = sett.tree ? `The ${mo.tree} · ${mo.kw}` : mo.kw;
}

/* ── WEEKDAY HEADERS ── */
function renderWDHeaders(s) {
  const el=document.getElementById('weekdays');
  if(view==='day'||view==='schedule') { el.classList.remove('show'); return; }
  el.classList.add('show');
  const sdow=s.getDay();
  let cols=7;
  if(view==='threeday') cols=3;
  el.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  el.innerHTML=Array.from({length:cols},(_,i)=>`<div class="wd">${WD[(sdow+i)%7]}</div>`).join('');
}

/* ── MONTH VIEW ── */
function renderMonth(s,el) {
  if(curM==='yd') { el.innerHTML=ydHTML(s); return; }
  const mo=MO[curM-1], ms=add(s,(curM-1)*28);
  const days=Array.from({length:28},(_,i)=>{
    const d=add(ms,i), isT=same(d,today), dn=i+1;
    const evs=evsDay(curM,dn);
    const dots=evs.slice(0,4).map(e=>`<span class="dot" style="background:${DOT[e.s]}" aria-hidden="true"></span>`).join('');
    const gregLabel = sett.greg ? `<span style="font-size:.52rem;color:var(--sub);line-height:1">${fg(d)}</span>` : '';
    return `<div class="dc${isT?' today':''}${i>=21?' last-row':''}" role="gridcell"
        aria-label="Day ${dn}${isT?' today':''}${evs.length?', '+evs.length+' event'+(evs.length>1?'s':''):''}"
        ${isT?'aria-current="date"':''}>
      <button tabindex="${isT?'0':'-1'}" onclick="goDay(${dn})" aria-label="Day ${dn}"></button>
      <div class="dc-inner">
        <span class="dc-n">${dn}</span>
        ${gregLabel}
        ${dots?`<div class="dots">${dots}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const upcoming=EVS.filter(e=>e.cm===curM).sort((a,b)=>a.cd-b.cd);
  const upHTML = upcoming.length
    ? upcoming.map(e=>{
        const d=add(ms,e.cd-1);
        const ts=e.ad?'All day':`${ft(e.sh)} – ${ft(e.eh)}`;
        return `<div class="up-item" role="listitem" tabindex="0" onclick="goDay(${e.cd})"
            aria-label="${e.t}, day ${e.cd}, ${ts}">
          <div class="up-badge"><div class="up-dn">${e.cd}</div><div class="up-dg">${fg(d)}</div></div>
          <div class="up-bar" style="background:${DOT[e.s]}" aria-hidden="true"></div>
          <div class="up-info"><div class="up-title">${e.t}</div><div class="up-time">${ts}</div></div>
        </div>`;
      }).join('')
    : `<div class="up-empty">No events this month</div>`;

  el.innerHTML=`
    <div class="month-grid" role="grid" aria-label="${mo.name} calendar">${days}</div>
    <div class="upcoming" role="region" aria-label="Events this month">
      <div class="up-hdr">Events this month</div>${upHTML}
    </div>`;

  const cells=[...el.querySelectorAll('.dc button')];
  el.onkeydown=e=>{
    if(!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) return;
    const i=cells.indexOf(document.activeElement); if(i===-1) return;
    e.preventDefault();
    const map={ArrowRight:1,ArrowLeft:-1,ArrowDown:7,ArrowUp:-7};
    const n=Math.max(0,Math.min(cells.length-1,i+map[e.key]));
    cells[n].focus(); cells.forEach((c,j)=>c.tabIndex=j===n?0:-1);
  };
}

/* ── N-DAY VIEW (week=7, threeday=3) ── */
function renderNDay(s,el,n) {
  if(curM==='yd') { el.innerHTML=`<div class="yd-cell">${ydInner(s)}</div>`; return; }
  const mo=MO[curM-1], ms=add(s,(curM-1)*28);
  const sdow=s.getDay();
  const H0=sett.h0, hours=Array.from({length:H1()-H0},(_,i)=>H0+i);
  // For 3-day: start at curD; for week: start at curW*7+1
  const startDay = n===3 ? curD : curW*7+1;

  const gutter='40px';
  const gridCols=`${gutter} repeat(${n},1fr)`;

  const dheads=Array.from({length:n},(_,i)=>{
    const dn=startDay+i; if(dn>28) return '';
    const d=add(ms,dn-1), isT=same(d,today);
    const wdname=WD[(sdow+((dn-1)%7))%7];
    return `<div class="tg-dcol${isT?' today':''}" tabindex="0"
        aria-label="${wdname} day ${dn}${isT?' today':''}"
        onclick="goDay(${dn})" onkeydown="if(event.key==='Enter')goDay(${dn})">
      <div class="tg-dname">${wdname}</div>
      <div class="tg-dnum">${dn}</div>
      ${sett.greg?`<div style="font-size:.52rem;color:var(--sub)">${fg(d)}</div>`:''}
    </div>`;
  }).join('');

  const tLabels=hours.map(h=>`<div class="tl">${ft(h)}</div>`).join('');

  const cols=Array.from({length:n},(_,i)=>{
    const dn=startDay+i; if(dn>28) return `<div class="wc"></div>`;
    const slots=hours.map(()=>`<div class="ws"></div>`).join('');
    const blks=evsDay(curM,dn).filter(e=>!e.ad).map(e=>`
      <div class="eb ${e.s}" style="top:${px(e.sh)}px;height:${pxh(e.eh-e.sh)}px"
          role="button" tabindex="0" aria-label="${e.t} ${ft(e.sh)}–${ft(e.eh)}">
        <div class="eb-t">${e.t}</div>
        <div class="eb-h">${ft(e.sh)}</div>
      </div>`).join('');
    return `<div class="wc">${slots}${blks}</div>`;
  }).join('');

  // Now line
  const nc=celticOf(today);
  let nl='';
  if(!nc.yd&&nc.cy===curY&&nc.month===curM) {
    const ci=nc.day-startDay;
    if(ci>=0&&ci<n) {
      const now=new Date(), nh=now.getHours()+now.getMinutes()/60;
      if(nh>=H0&&nh<H1()) {
        const colW=100/n;
        nl=`<div class="nl" style="top:${px(nh)}px;left:calc(40px + ${ci*colW}%);width:calc((100% - 40px)/${n})" aria-hidden="true"></div>`;
      }
    }
  }

  el.innerHTML=`<div class="tg-wrap" role="grid" aria-label="${n===3?'3-day':'Week'} view ${mo.name}">
    <div class="tg-head" style="grid-template-columns:${gridCols}" role="row">
      <div class="tg-gutter" role="presentation"></div>${dheads}
    </div>
    <div class="tg-body" style="grid-template-columns:${gridCols}" role="rowgroup">
      <div>${tLabels}</div>${cols}${nl}
    </div>
  </div>`;

  scrollNow(el);
}

/* ── DAY VIEW ── */
function renderDay(s,el) {
  if(curM==='yd') { el.innerHTML=`<div class="yd-cell">${ydInner(s)}</div>`; return; }
  const mo=MO[curM-1], dg=add(s,(curM-1)*28+curD-1), isT=same(dg,today);
  const evs=evsDay(curM,curD), ads=evs.filter(e=>e.ad), timed=evs.filter(e=>!e.ad);
  const H0=sett.h0, hours=Array.from({length:H1()-H0},(_,i)=>H0+i);

  const pills=ads.map(e=>`<div class="ad-pill ${e.s}" tabindex="0" role="button" aria-label="${e.t} all day">${e.t}</div>`).join('');

  // Left gutter: one label div per hour, each exactly SLOT px tall
  const timeCol=hours.map(h=>
    `<div style="height:${SLOT}px;display:flex;align-items:flex-start;padding:3px 6px 0 0;justify-content:flex-end;font-family:'Cinzel',serif;font-size:.55rem;color:var(--sub);">${ft(h)}</div>`
  ).join('');

  // Right column: hour slot divs stacked (define the height) + events absolute on top
  const slotDivs=hours.map((h,i)=>
    `<div style="height:${SLOT}px;border-bottom:${i<hours.length-1?'1px solid #e0d8cc':'none'};"></div>`
  ).join('');

  // Events: absolute inside the right column, top relative to column start
  const blks=timed.map(e=>`
    <div class="eb ${e.s}"
        style="position:absolute;top:${px(e.sh)}px;height:${pxh(e.eh-e.sh)}px;left:4px;right:4px;"
        role="button" tabindex="0" aria-label="${e.t} ${ft(e.sh)}–${ft(e.eh)}">
      <div class="eb-t">${e.t}</div>
      <div class="eb-h">${ft(e.sh)} – ${ft(e.eh)}</div>
    </div>`).join('');

  // Now line: absolute inside the right column
  let nl='';
  if(isT) {
    const now=new Date(), nh=now.getHours()+now.getMinutes()/60;
    if(nh>=H0&&nh<H1()) nl=`<div class="nl" style="position:absolute;top:${px(nh)}px;left:0;right:0;" aria-hidden="true"></div>`;
  }

  el.innerHTML=`
    <div class="day-head-row">
      <div class="day-h-g"></div>
      <div class="day-h-info">
        <div class="day-h-date">${fgl(dg)} · ${mo.name} Day ${curD}</div>
        <div class="day-h-kw">${sett.tree?`The ${mo.tree} · `:''}${mo.kw}</div>
      </div>
    </div>
    <div class="allday-row">
      <div class="allday-lbl">all day</div>
      <div class="allday-pills">${pills||'<span style="font-size:.68rem;color:var(--sub);font-style:italic">—</span>'}</div>
    </div>
    <div style="display:flex;">
      <div style="width:40px;flex-shrink:0;border-right:1.5px solid var(--bdr);background:#f0ece4;">
        ${timeCol}
      </div>
      <div style="flex:1;position:relative;">
        ${slotDivs}
        ${blks}
        ${nl}
      </div>
    </div>`;

  scrollNow(el);
}

/* ── SCHEDULE VIEW ── */
function renderSchedule(s,el) {
  // Collect all events for the year (or month) sorted by month+day
  const allEvs = [...EVS].sort((a,b)=>a.cm-b.cm||a.cd-b.cd);

  if(!allEvs.length) {
    el.innerHTML=`<div class="sched-empty">No events found</div>`; return;
  }

  // Group by month → day
  const groups = {};
  allEvs.forEach(e => {
    const key=`${e.cm}|${e.cd}`;
    if(!groups[key]) groups[key]={cm:e.cm,cd:e.cd,evs:[]};
    groups[key].evs.push(e);
  });

  let html='', lastM=null;
  Object.values(groups).forEach(g=>{
    if(g.cm==='yd') return;
    const mo=MO[g.cm-1];
    const ms=add(s,(g.cm-1)*28);
    const d=add(ms,g.cd-1), isT=same(d,today);

    // Month divider
    if(g.cm!==lastM) {
      html+=`<div class="sched-mo-hdr">${mo.name} · The ${mo.tree} · ${mo.kw}</div>`;
      lastM=g.cm;
    }

    const dayHdr=`<div class="sched-d-hdr${isT?' today-hdr':''}" role="rowheader">
      <div class="sched-badge">
        <div class="sched-dn${isT?' today-n':''}">${g.cd}</div>
        <div class="sched-dg">${fg(d)}</div>
      </div>
      <div class="sched-mo">${mo.name}</div>
    </div>`;

    const evRows=g.evs.map(e=>{
      const ts=e.ad?'All day':`${ft(e.sh)} – ${ft(e.eh)}`;
      return `<div class="sched-ev" tabindex="0" role="listitem"
          onclick="goDay(${g.cd});curM=${g.cm};setView('day')"
          aria-label="${e.t}, ${ts}">
        <div class="sched-bar" style="background:${DOT[e.s]}" aria-hidden="true"></div>
        <div class="sched-info">
          <div class="sched-et">${e.t}</div>
          <div class="sched-eh">${ts}</div>
        </div>
      </div>`;
    }).join('');

    html+=`<div class="sched-day">${dayHdr}${evRows}</div>`;
  });

  el.innerHTML=`<div role="list" aria-label="Schedule">${html}</div>`;

  // Scroll to today's events if visible
  setTimeout(()=>{
    const todayHdr=el.querySelector('.today-hdr');
    if(todayHdr) todayHdr.scrollIntoView({block:'start',behavior:'smooth'});
  },60);
}

/* ── UTILITIES ── */
function scrollNow(el) {
  const now=new Date(), nh=now.getHours()+now.getMinutes()/60;
  if(nh<sett.h0) return;
  setTimeout(()=>el.scrollTop=Math.max(0,px(nh)-100), 40);
}
function ydInner(s) {
  const yd=add(s,364), isT=same(yd,today);
  return `<div class="yd-t">&#9790; Year and a Day &#9728;</div>
    <div class="yd-g">${fg(yd)}</div>
    <div class="yd-d">A threshold between years, belonging to no month.<br>A time for rest, reflection, and passage.</div>`;
}
function ydHTML(s) { return `<div class="yd-cell">${ydInner(s)}</div>`; }

/* ── DRAWER STRIP ── */
function renderDStrip() {
  const ti2=todayInfo(), ty=cyr(today);
  const items=MO.map(mo=>{
    const ia=curM===mo.n, ht2=ty===curY&&!ti2.yd&&ti2.month===mo.n;
    return `<button class="dsm${ia?' active':''}"
        aria-label="${mo.name} ${mo.kw}${ia?' current':''}${ht2?' contains today':''}"
        aria-current="${ia?'true':'false'}"
        onclick="goM(${mo.n});closeDrawer()">
      <span class="dsm-n">${mo.n}</span>
      <span class="dsm-nm">${mo.name}</span>
      <span class="dsm-kw">${mo.kw}</span>
      ${ht2?'<span class="dsm-dot" aria-hidden="true"></span>':''}
    </button>`;
  });
  const ya=curM==='yd', yt=ty===curY&&ti2.yd;
  items.push(`<button class="dsm${ya?' active':''}"
      aria-label="Year Day${ya?' current':''}${yt?' today':''}"
      aria-current="${ya?'true':'false'}"
      onclick="goM('yd');closeDrawer()">
    <span class="dsm-n">&#9790;</span><span class="dsm-nm">Year Day</span>
    <span class="dsm-kw">Between the worlds</span>
    ${yt?'<span class="dsm-dot" aria-hidden="true"></span>':''}
  </button>`);
  document.getElementById('dstrip').innerHTML=items.join('');
}

/* ── NAV ── */
function goM(m)  { curM=m; curW=0; curD=1; render(); }
function goDay(d){ curD=d; setView('day'); }

function prev() {
  if(view==='month'||view==='schedule') {
    if(curM==='yd') curM=13;
    else if(curM>1) curM--; else {curY--;curM=13;}
    curW=0; curD=1;
  } else if(view==='threeday') {
    curD=Math.max(1,curD-3);
    curW=Math.floor((curD-1)/7);
  } else if(view==='week') {
    if(curW>0) curW--;
    else { if(curM==='yd'){curM=13;curW=3;} else if(curM>1){curM--;curW=3;} else {curY--;curM=13;curW=3;} }
    curD=curW*7+1;
  } else {
    curD--;
    if(curD<1){ if(curM==='yd'){curM=13;curD=28;} else if(curM>1){curM--;curD=28;} else {curY--;curM=13;curD=28;} }
    curW=Math.floor((curD-1)/7);
  }
  render();
}
function next() {
  if(view==='month'||view==='schedule') {
    if(curM===13) curM='yd'; else if(curM==='yd'){curY++;curM=1;} else curM++;
    curW=0; curD=1;
  } else if(view==='threeday') {
    const nd=curD+3;
    if(nd>28){ if(curM===13)curM='yd'; else if(curM==='yd'){curY++;curM=1;} else curM++;curD=1; }
    else curD=nd;
    curW=Math.floor((curD-1)/7);
  } else if(view==='week') {
    if(curM==='yd'){curY++;curM=1;curW=0;}
    else if(curW<3) curW++;
    else if(curM<13){curM++;curW=0;} else {curM='yd';curW=0;}
    curD=curW*7+1;
  } else {
    curD++;
    if(curD>28){ if(curM===13)curM='yd'; else if(curM==='yd'){curY++;curM=1;} else curM++;curD=1; }
    curW=Math.floor((curD-1)/7);
  }
  render();
}
function goToday() {
  curY=cyr(today); const t2=todayInfo();
  curM=t2.yd?'yd':t2.month; curD=t2.yd?1:t2.day; curW=t2.yd?0:Math.floor((t2.day-1)/7);
  render();
}

document.getElementById('prev').onclick    = prev;
document.getElementById('next').onclick    = next;
document.getElementById('todayBtn').onclick = goToday;

loadSett();
render();
</script>
</body>
